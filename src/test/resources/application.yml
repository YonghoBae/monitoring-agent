spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  ai:
    vectorstore:
      pgvector:
        initialize-schema: false
    google:
      genai:
        api-key: test-key

discord:
  webhook:
    url: http://localhost
  bot:
    channel-id:
    allowed-role-id:
    approval-ttl-minutes: 30

prometheus:
  url: http://localhost:9090

loki:
  url: http://localhost:3100

agent:
  evaluation:
    enabled: false
